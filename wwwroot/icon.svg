<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="page" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f1f5f9;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Fundo arredondado -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Sombra do caderno -->
  <rect x="138" y="108" width="248" height="310" rx="16" fill="rgba(0,0,0,0.18)"/>

  <!-- Corpo do caderno -->
  <rect x="130" y="100" width="248" height="310" rx="16" fill="url(#page)"/>

  <!-- Lombada esquerda -->
  <rect x="130" y="100" width="36" height="310" rx="16" fill="#6d28d9"/>
  <rect x="148" y="100" width="18" height="310" fill="#6d28d9"/>

  <!-- Espiral / argolas -->
  <circle cx="166" cy="168" r="10" fill="none" stroke="#fff" stroke-width="6"/>
  <circle cx="166" cy="220" r="10" fill="none" stroke="#fff" stroke-width="6"/>
  <circle cx="166" cy="272" r="10" fill="none" stroke="#fff" stroke-width="6"/>
  <circle cx="166" cy="324" r="10" fill="none" stroke="#fff" stroke-width="6"/>

  <!-- Linhas de texto -->
  <rect x="196" y="162" width="148" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="196" y="188" width="120" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="196" y="214" width="140" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="196" y="240" width="100" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="196" y="266" width="130" height="10" rx="5" fill="#e2e8f0"/>
  <rect x="196" y="292" width="80" height="10" rx="5" fill="#e2e8f0"/>

  <!-- Marcador / bookmark -->
  <path d="M310 100 L350 100 L350 185 L330 168 L310 185 Z" fill="#7c3aed" opacity="0.9"/>
</svg>
